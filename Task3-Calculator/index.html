<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calculator | HTML CSS JavaScript</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator">

        <h1>🧮 Smart Calculator</h1>
        <p class="subtitle">Simple • Fast • Responsive</p>

        <div class="display">
            <input type="text" id="display" placeholder="0" readonly>
        </div>

        <div class="buttons">

            <button class="operator clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendValue('/')">&divide;</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">&times;</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="changeSign()">+/-</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="operator equal" onclick="calculate()">=</button>

        </div>

    </div>

    <p class="footer">
        © 2026 Smart Calculator | Created by Amanpreet
    </p>

    <script src="script.js"></script>
</body>

</html>
